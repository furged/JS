<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Temperature Conversion</h1>
    <label>Enter temperature in Celsius: </label> <br>
    <input type="text" id="textBox"> <br>
    <label>Select Unit to convert into:</label><br>
    <input type="radio" id="cBtn" name="unit"> 
    <label>C</label>
    <input type="radio" id="fBtn" name="unit"> 
    <label>F</label> <br>
    <button type="button" id="submitBtn">Convert</button> <br>
    <label id="tempLabel"></label>
    
    <script src="script.js"></script>
</body>
</html>
